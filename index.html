<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>全能优惠计算器 | 固定数字键盘</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #f0f4fa 0%, #dce3ec 100%);
            font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', 'Helvetica Neue', Helvetica, sans-serif;
            padding: 0.8rem 0.8rem 1rem;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
        }

        /* 主卡片 */
        .card {
            max-width: 560px;
            width: 100%;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.97);
            border-radius: 1.8rem;
            box-shadow: 0 12px 28px -10px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            transition: all 0.2s ease;
        }

        /* tab切换 - 紧凑 */
        .tab-bar {
            display: flex;
            background: #f8fafd;
            padding: 0.4rem 0.6rem;
            gap: 0.4rem;
            border-bottom: 1px solid #eef2f8;
            flex-wrap: nowrap;
            overflow-x: auto;
            scrollbar-width: thin;
        }

        .tab-btn {
            flex: 1;
            text-align: center;
            padding: 0.55rem 0.2rem;
            font-size: 0.8rem;
            font-weight: 590;
            background: transparent;
            border: none;
            border-radius: 2rem;
            color: #5c6f8f;
            transition: all 0.2s;
            cursor: pointer;
            letter-spacing: -0.2px;
            white-space: nowrap;
        }

        .tab-btn.active {
            background: #ffffff;
            color: #1f3b62;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            font-weight: 620;
        }

        .content {
            padding: 0.9rem 1rem 0.8rem;
        }

        /* 置顶结果区 */
        .result-top-area {
            background: linear-gradient(135deg, #eef3ff 0%, #e4eefb 100%);
            border-radius: 1.4rem;
            padding: 0.7rem 1rem;
            margin-bottom: 1rem;
            border: 1px solid rgba(255,255,255,0.6);
        }

        /* 双输入一行不换行 */
        .input-row {
            display: flex;
            flex-direction: row;
            gap: 0.75rem;
            margin-bottom: 1rem;
            flex-wrap: nowrap;
        }

        .input-cell {
            flex: 1;
            min-width: 0;
        }

        .input-label {
            font-size: 0.7rem;
            font-weight: 550;
            color: #2c3e50;
            margin-bottom: 0.2rem;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .label-icon {
            font-size: 0.85rem;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            background: #f2f5f9;
            border-radius: 1.5rem;
            border: 1px solid #e2e9f2;
            transition: all 0.2s;
            padding: 0.05rem 0.05rem 0.05rem 0.9rem;
        }

        .input-wrapper:focus-within {
            border-color: #3c6e9c;
            background: #ffffff;
            box-shadow: 0 0 0 2px rgba(60, 110, 156, 0.15);
        }

        .currency-symbol {
            font-size: 0.95rem;
            font-weight: 500;
            color: #5c6f87;
            margin-right: 4px;
        }

        .input-field {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 1rem;
            padding: 0.6rem 0.3rem 0.6rem 0;
            font-weight: 500;
            outline: none;
            color: #1a2c3f;
            width: 100%;
        }

        .input-field::placeholder {
            color: #b7c3d4;
            font-weight: 400;
            font-size: 0.8rem;
        }

        .percent-symbol {
            padding-right: 0.8rem;
            color: #6f85a3;
            font-weight: 500;
            font-size: 0.9rem;
        }

        /* 归零按钮 */
        .reset-btn {
            background: #f0f2f6;
            border: 1px solid #dce3ec;
            width: 100%;
            padding: 0.6rem;
            border-radius: 2rem;
            font-size: 0.85rem;
            font-weight: 570;
            color: #3a5670;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 0.2rem;
            margin-bottom: 0.6rem;
        }

        .reset-btn:active {
            transform: scale(0.97);
            background: #e4e9f0;
        }

        /* 固定数字键盘 */
        .custom-keyboard {
            background: #f8fafd;
            border-radius: 1.5rem;
            padding: 0.8rem 0.6rem;
            margin-top: 0.2rem;
            border: 1px solid #e9eef3;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
        }

        .keyboard-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 0.5rem;
        }

        .key-btn {
            background: white;
            border: none;
            border-radius: 2.2rem;
            padding: 0.7rem 0;
            font-size: 1.2rem;
            font-weight: 550;
            color: #1f3b62;
            text-align: center;
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            font-family: monospace;
            letter-spacing: 0;
        }

        .key-btn:active {
            transform: scale(0.94);
            background: #eef2f8;
        }

        .key-btn.special {
            background: #eef2fa;
            color: #2c5a7a;
            font-weight: 600;
            font-size: 1rem;
        }

        .key-btn.clear-btn {
            background: #ffe8e0;
            color: #c25a2c;
        }

        /* 结果内部样式 */
        .result-label {
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #4f6f8f;
            font-weight: 600;
        }

        .result-value {
            font-size: 1.9rem;
            font-weight: 750;
            color: #1a3f60;
            margin: 0.1rem 0 0.15rem;
            word-break: break-word;
            line-height: 1.2;
        }

        .discount-saved {
            background: rgba(30, 70, 60, 0.06);
            border-radius: 1.5rem;
            padding: 0.4rem 0.8rem;
            margin-top: 0.3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            font-weight: 500;
            color: #1a5a3c;
        }

        .saved-amount {
            font-size: 1.2rem;
            font-weight: 800;
            color: #137a4b;
        }

        .info-note {
            font-size: 0.65rem;
            color: #7c8ba0;
            text-align: center;
            margin-top: 0.5rem;
            border-top: 1px solid #eef2f8;
            padding-top: 0.5rem;
        }

        .error-msg {
            background: #ffe8e8;
            border-radius: 1.2rem;
            padding: 0.6rem;
            text-align: center;
            color: #d14b4b;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .neutral-tip {
            background: #f0f4fa;
            border-radius: 1.2rem;
            padding: 0.65rem;
            text-align: center;
            color: #567190;
            font-size: 0.73rem;
            font-weight: 500;
        }

        footer {
            font-size: 0.6rem;
            text-align: center;
            color: #8f9bb3;
            padding: 0.6rem 0 0.6rem;
            border-top: 1px solid #eef2f8;
            margin-top: 0.2rem;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="tab-bar">
        <button class="tab-btn" data-mode="mode1">💰 原价+折扣</button>
        <button class="tab-btn" data-mode="mode2">✨ 到手价+折扣</button>
        <button class="tab-btn" data-mode="mode3">🔁 原价+到手价</button>
    </div>

    <div class="content" id="appContent">
        <!-- 动态内容：结果区 + 输入行 + 归零按钮 + 自定义键盘 -->
    </div>
    <footer>自动计算 · 固定数字键盘（手机无系统键盘）</footer>
</div>

<script>
    // 当前激活的模式
    let currentMode = 'mode2';
    // 当前聚焦的输入框元素 (用于数字键盘输入)
    let activeInputElement = null;
    // 是否为移动端（触屏且大概率不支持物理键盘永久展示，使用readonly）
    const isMobile = (() => {
        return ('ontouchstart' in window) && 
               (/(Mobi|Android|iPhone|iPad|iPod|BlackBerry|Windows Phone)/i.test(navigator.userAgent) ||
                (window.matchMedia && window.matchMedia("(pointer: coarse)").matches && window.innerWidth <= 768));
    })();

    const contentContainer = document.getElementById('appContent');

    // ========== 通用工具函数 ==========
    function formatMoney(value) {
        if (isNaN(value) || value === null || value === undefined) return '0.00';
        return Number(value).toFixed(2);
    }

    function formatPercent(value) {
        if (isNaN(value) || value === null || value === undefined) return '0.0';
        return Number(value).toFixed(1);
    }

    // 核心计算 (无改动)
    function calculate(mode, originalPrice, finalPrice, discountPercent) {
        let result = { original: null, final: null, saved: null, discountPercent: null, error: null };
        if (mode === 'mode1') {
            let original = parseFloat(originalPrice);
            let discount = parseFloat(discountPercent);
            if (isNaN(original) || original <= 0) { result.error = '原价必须是大于0的数字'; return result; }
            if (isNaN(discount)) { result.error = '请输入有效的折扣百分比'; return result; }
            if (discount < 0) { result.error = '折扣不能小于0%'; return result; }
            if (discount > 100) { result.error = '折扣不能超过100%'; return result; }
            const finalCalculated = original * (1 - discount / 100);
            const savedCalculated = original - finalCalculated;
            result.original = Number(original.toFixed(2));
            result.final = Number(finalCalculated.toFixed(2));
            result.saved = Number(savedCalculated.toFixed(2));
            result.discountPercent = discount;
        } 
        else if (mode === 'mode2') {
            let final = parseFloat(finalPrice);
            let discount = parseFloat(discountPercent);
            if (isNaN(final) || final <= 0) { result.error = '到手价必须是大于0的数字'; return result; }
            if (isNaN(discount)) { result.error = '请输入有效的折扣百分比'; return result; }
            if (discount < 0) { result.error = '折扣不能小于0%'; return result; }
            if (discount > 100) { result.error = '折扣不能超过100%'; return result; }
            if (discount === 100) { result.error = '折扣100%意味着免费，原价无穷大'; return result; }
            const originalCalculated = final / (1 - discount / 100);
            if (originalCalculated <= 0) { result.error = '计算原价异常'; return result; }
            const savedCalculated = originalCalculated - final;
            result.original = Number(originalCalculated.toFixed(2));
            result.final = Number(final.toFixed(2));
            result.saved = Number(savedCalculated.toFixed(2));
            result.discountPercent = discount;
        }
        else if (mode === 'mode3') {
            let original = parseFloat(originalPrice);
            let final = parseFloat(finalPrice);
            if (isNaN(original) || original <= 0) { result.error = '原价必须是大于0的数字'; return result; }
            if (isNaN(final) || final <= 0) { result.error = '到手价必须是大于0的数字'; return result; }
            if (original < final) { result.error = '原价不能小于到手价（折扣不能为负）'; return result; }
            const savedCalculated = original - final;
            let discountCalc = (savedCalculated / original) * 100;
            if (discountCalc > 100) discountCalc = 100;
            if (discountCalc < 0) discountCalc = 0;
            result.original = Number(original.toFixed(2));
            result.final = Number(final.toFixed(2));
            result.saved = Number(savedCalculated.toFixed(2));
            result.discountPercent = discountCalc;
        }
        if (result.original !== null) result.original = Number(result.original.toFixed(2));
        if (result.final !== null) result.final = Number(result.final.toFixed(2));
        if (result.saved !== null) result.saved = Number(result.saved.toFixed(2));
        if (result.discountPercent !== null) result.discountPercent = Number(result.discountPercent);
        return result;
    }

    // 展示结果到顶部区域
    function displayResultToTop(result, mode) {
        const topContainer = document.getElementById('topResultContainer');
        if (!topContainer) return;
        if (result && result.error) {
            topContainer.innerHTML = `<div class="error-msg">⚠️ ${escapeHtml(result.error)}</div>`;
            return;
        }
        if (!result || result.original === null || result.final === null) {
            topContainer.innerHTML = `<div class="neutral-tip">✨ 输入数字，自动计算优惠金额与折扣</div>`;
            return;
        }
        const originalPrice = result.original, finalPrice = result.final, savedAmount = result.saved, discountPercent = result.discountPercent;
        if (mode === 'mode1') {
            topContainer.innerHTML = `
                <div><div class="result-label">💰 优惠后到手价</div>
                <div class="result-value">¥ ${formatMoney(finalPrice)}</div>
                <div class="discount-saved"><span>🎉 共优惠金额</span><span class="saved-amount">¥ ${formatMoney(savedAmount)}</span></div>
                <div style="font-size:0.7rem; margin-top:6px;">原价 ¥ ${formatMoney(originalPrice)} → 到手 ¥ ${formatMoney(finalPrice)}</div>
                <div class="info-note">💡 立减 ${formatPercent(discountPercent)}% · 省了 ¥ ${formatMoney(savedAmount)}</div></div>`;
        } else if (mode === 'mode2') {
            topContainer.innerHTML = `
                <div><div class="result-label">🏷️ 商品原价 (折前)</div>
                <div class="result-value">¥ ${formatMoney(originalPrice)}</div>
                <div class="discount-saved"><span>🎉 共优惠金额</span><span class="saved-amount">¥ ${formatMoney(savedAmount)}</span></div>
                <div style="font-size:0.7rem; margin-top:6px;">原价 ¥ ${formatMoney(originalPrice)} → 到手 ¥ ${formatMoney(finalPrice)}</div>
                <div class="info-note">💡 立减 ${formatPercent(discountPercent)}% · 省了 ¥ ${formatMoney(savedAmount)}</div></div>`;
        } else if (mode === 'mode3') {
            const finalDiscount = (100 - discountPercent).toFixed(1);
            topContainer.innerHTML = `
                <div><div class="result-label">🎯 实际立减折扣</div>
                <div class="result-value">${formatPercent(discountPercent)}%</div>
                <div class="discount-saved"><span>💸 共优惠金额</span><span class="saved-amount">¥ ${formatMoney(savedAmount)}</span></div>
                <div style="font-size:0.7rem; margin-top:6px; background:rgba(0,0,0,0.02); padding:4px 10px; border-radius:2rem; display:inline-block;">原价 ¥ ${formatMoney(originalPrice)} → 到手 ¥ ${formatMoney(finalPrice)}</div>
                <div class="info-note">📐 相当于打了 ${finalDiscount} 折，节省 ¥ ${formatMoney(savedAmount)}</div></div>`;
        }
    }

    // 自动计算入口
    function performAutoCalculation() {
        let resultObj = null;
        let hasValidInput = false;
        if (currentMode === 'mode1') {
            const origElem = document.getElementById('originalInput');
            const discElem = document.getElementById('discountInput');
            if (origElem && discElem) {
                const origVal = origElem.value.trim(), discVal = discElem.value.trim();
                if (origVal !== '' && discVal !== '') { hasValidInput = true; resultObj = calculate('mode1', origVal, null, discVal); }
                else resultObj = { error: null, original: null, final: null };
            }
        } else if (currentMode === 'mode2') {
            const finalElem = document.getElementById('finalInput');
            const discElem = document.getElementById('discountInput');
            if (finalElem && discElem) {
                const finalVal = finalElem.value.trim(), discVal = discElem.value.trim();
                if (finalVal !== '' && discVal !== '') { hasValidInput = true; resultObj = calculate('mode2', null, finalVal, discVal); }
                else resultObj = { error: null, original: null, final: null };
            }
        } else if (currentMode === 'mode3') {
            const origElem = document.getElementById('originalInput');
            const finalElem = document.getElementById('finalInput');
            if (origElem && finalElem) {
                const origVal = origElem.value.trim(), finalVal = finalElem.value.trim();
                if (origVal !== '' && finalVal !== '') { hasValidInput = true; resultObj = calculate('mode3', origVal, finalVal, null); }
                else resultObj = { error: null, original: null, final: null };
            }
        }
        if (!resultObj) return;
        if (!hasValidInput && (!resultObj.error)) {
            const top = document.getElementById('topResultContainer');
            if (top) top.innerHTML = `<div class="neutral-tip">📝 请输入完整信息，自动计算优惠结果</div>`;
            return;
        }
        if (resultObj.error) displayResultToTop(resultObj, currentMode);
        else if (resultObj.original !== null && resultObj.final !== null) displayResultToTop(resultObj, currentMode);
        else {
            const top = document.getElementById('topResultContainer');
            if (top) top.innerHTML = `<div class="neutral-tip">✨ 输入数字，自动计算</div>`;
        }
    }

    // 归零
    function resetAllInputs() {
        if (currentMode === 'mode1') {
            let input1 = document.getElementById('originalInput');
            let input2 = document.getElementById('discountInput');
            if (input1) input1.value = '';
            if (input2) input2.value = '';
        } else if (currentMode === 'mode2') {
            let input1 = document.getElementById('finalInput');
            let input2 = document.getElementById('discountInput');
            if (input1) input1.value = '';
            if (input2) input2.value = '';
        } else if (currentMode === 'mode3') {
            let input1 = document.getElementById('originalInput');
            let input2 = document.getElementById('finalInput');
            if (input1) input1.value = '';
            if (input2) input2.value = '';
        }
        // 清空后重新计算
        performAutoCalculation();
        // 保持活跃聚焦不清除
    }

    // 数字键盘操作：向当前活动输入框添加/删除内容
    function handleKeyboardInput(value) {
        if (!activeInputElement) {
            // 无聚焦，轻提示无效果但是不报错，用户可以先点击输入框
            return;
        }
        const input = activeInputElement;
        let currentVal = input.value;
        if (value === '⌫') {
            // 删除最后一个字符
            input.value = currentVal.slice(0, -1);
        } else if (value === 'C') {
            input.value = '';
        } else if (value === '.') {
            // 防止多个小数点
            if (currentVal.includes('.')) return;
            input.value = currentVal + '.';
        } else {
            // 数字追加
            input.value = currentVal + value;
        }
        // 触发input事件以自动计算
        input.dispatchEvent(new Event('input', { bubbles: true }));
        performAutoCalculation();
        // 保持焦点
        input.focus();
    }

    // 设置移动端readonly & 绑定聚焦/失焦捕获
    function setupInputFocusManagement() {
        // 获取当前所有输入框
        const inputs = document.querySelectorAll('.input-field');
        if (!inputs.length) return;
        const isMobileDevice = isMobile;
        inputs.forEach(input => {
            // 先移除旧监听避免重复
            input.removeEventListener('focus', handleFocus);
            input.removeEventListener('blur', handleBlur);
            // 移动端设置readonly，阻止系统键盘
            if (isMobileDevice) {
                input.setAttribute('readonly', 'readonly');
            } else {
                input.removeAttribute('readonly');
            }
            // 添加聚焦与失焦
            input.addEventListener('focus', handleFocus);
            input.addEventListener('blur', handleBlur);
        });
        // 如果没有活跃元素且存在任一输入框，默认可以选第一个？不自动，等用户点击。
    }

    function handleFocus(e) {
        activeInputElement = e.target;
        // 可选添加高亮样式
        if (activeInputElement) {
            document.querySelectorAll('.input-wrapper').forEach(w => w.style.borderColor = '#e2e9f2');
            const parentWrapper = activeInputElement.closest('.input-wrapper');
            if (parentWrapper) parentWrapper.style.borderColor = '#3c6e9c';
        }
    }
    function handleBlur(e) {
        // 不清空activeInputElement? 为了仍然可以物理键盘键入时保留最后聚焦，但是PC上失去焦点后，键盘按钮应失效？推荐保留最后聚焦元素，但其他输入框获得焦点会覆盖。
        // 由于每次focus都会更新activeInputElement，blur时不立即设为null，能让键盘按钮继续在失去焦点后对最后一个输入框操作(违背直觉但友好)
        // 但一般用户习惯于点击新输入框后再输入，所以保留也无大碍; 但为了防止误操作，可以在延迟后置空？但为了方便，若没有任何焦点时键盘无效。我们这样做: 失去焦点时不清空，但下次点击其他输入框focus会更新。
        // 没问题。
    }

    // 绑定键盘按钮事件 (每次render后)
    function bindKeyboardEvents() {
        const keys = document.querySelectorAll('.key-btn');
        keys.forEach(btn => {
            const newBtn = btn.cloneNode(true);
            btn.parentNode?.replaceChild(newBtn, btn);
            newBtn.addEventListener('click', (e) => {
                e.preventDefault();
                const val = newBtn.getAttribute('data-key');
                if (val) handleKeyboardInput(val);
            });
            // 移动端touch避免页面缩放
            newBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const val = newBtn.getAttribute('data-key');
                if (val) handleKeyboardInput(val);
            }, { passive: false });
        });
    }

    // 绑定归零按钮事件
    function bindResetEvent() {
        const resetBtn = document.getElementById('resetButtonGlobal');
        if (resetBtn) {
            const newBtn = resetBtn.cloneNode(true);
            resetBtn.parentNode?.replaceChild(newBtn, resetBtn);
            newBtn.addEventListener('click', (e) => {
                e.preventDefault();
                resetAllInputs();
            });
        }
    }

    // 为输入框绑定自动计算(原有input事件)
    function bindAutoInputEvents() {
        if (currentMode === 'mode1') {
            const origEl = document.getElementById('originalInput');
            const discEl = document.getElementById('discountInput');
            if (origEl) origEl.addEventListener('input', () => performAutoCalculation());
            if (discEl) discEl.addEventListener('input', () => performAutoCalculation());
        } else if (currentMode === 'mode2') {
            const finalEl = document.getElementById('finalInput');
            const discEl = document.getElementById('discountInput');
            if (finalEl) finalEl.addEventListener('input', () => performAutoCalculation());
            if (discEl) discEl.addEventListener('input', () => performAutoCalculation());
        } else if (currentMode === 'mode3') {
            const origEl = document.getElementById('originalInput');
            const finalEl = document.getElementById('finalInput');
            if (origEl) origEl.addEventListener('input', () => performAutoCalculation());
            if (finalEl) finalEl.addEventListener('input', () => performAutoCalculation());
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
    }

    // 渲染整体界面 (包含键盘)
    function render() {
        let inputRowHtml = '';
        if (currentMode === 'mode1') {
            inputRowHtml = `
                <div class="input-row">
                    <div class="input-cell"><div class="input-label"><span class="label-icon">🏷️</span> 原价</div>
                    <div class="input-wrapper"><span class="currency-symbol">¥</span><input type="text" class="input-field" id="originalInput" placeholder="199.00" step="any" value=""></div></div>
                    <div class="input-cell"><div class="input-label"><span class="label-icon">⚡</span> 立减 %</div>
                    <div class="input-wrapper"><input type="text" class="input-field" id="discountInput" placeholder="15" value=""><span class="percent-symbol">%</span></div></div>
                </div>`;
        } else if (currentMode === 'mode2') {
            inputRowHtml = `
                <div class="input-row">
                    <div class="input-cell"><div class="input-label"><span class="label-icon">🛒</span> 到手价</div>
                    <div class="input-wrapper"><span class="currency-symbol">¥</span><input type="text" class="input-field" id="finalInput" placeholder="89.90" value=""></div></div>
                    <div class="input-cell"><div class="input-label"><span class="label-icon">📉</span> 立减 %</div>
                    <div class="input-wrapper"><input type="text" class="input-field" id="discountInput" placeholder="20" value=""><span class="percent-symbol">%</span></div></div>
                </div>`;
        } else if (currentMode === 'mode3') {
            inputRowHtml = `
                <div class="input-row">
                    <div class="input-cell"><div class="input-label"><span class="label-icon">🏷️</span> 原价</div>
                    <div class="input-wrapper"><span class="currency-symbol">¥</span><input type="text" class="input-field" id="originalInput" placeholder="299.00" value=""></div></div>
                    <div class="input-cell"><div class="input-label"><span class="label-icon">🎁</span> 到手价</div>
                    <div class="input-wrapper"><span class="currency-symbol">¥</span><input type="text" class="input-field" id="finalInput" placeholder="209.30" value=""></div></div>
                </div>`;
        }

        // 固定数字键盘布局
        const keyboardHtml = `
            <div class="custom-keyboard">
                <div class="keyboard-grid">
                    <button class="key-btn" data-key="1">1</button>
                    <button class="key-btn" data-key="2">2</button>
                    <button class="key-btn" data-key="3">3</button>
                    <button class="key-btn" data-key="4">4</button>
                    <button class="key-btn" data-key="5">5</button>
                    <button class="key-btn" data-key="6">6</button>
                    <button class="key-btn" data-key="7">7</button>
                    <button class="key-btn" data-key="8">8</button>
                    <button class="key-btn" data-key="9">9</button>
                    <button class="key-btn special" data-key="C">C</button>
                    <button class="key-btn" data-key="0">0</button>
                    <button class="key-btn" data-key=".">.</button>
                    <button class="key-btn special" data-key="⌫">⌫</button>
                </div>
            </div>
        `;

        const fullHtml = `
            <div id="topResultContainer" class="result-top-area">
                <div class="neutral-tip">✨ 输入数字，自动计算优惠金额与折扣</div>
            </div>
            ${inputRowHtml}
            <button id="resetButtonGlobal" class="reset-btn">🔄 一键归零 / 清空所有</button>
            ${keyboardHtml}
        `;
        contentContainer.innerHTML = fullHtml;
        // 绑定输入自动计算
        bindAutoInputEvents();
        // 设置移动端属性及焦点管理
        setupInputFocusManagement();
        // 绑定归零按钮
        bindResetEvent();
        // 绑定数字键盘事件
        bindKeyboardEvents();
        // 初始计算展示提示
        performAutoCalculation();
    }

    // Tab切换
    function handleTabClick(e) {
        const btn = e.currentTarget;
        const mode = btn.getAttribute('data-mode');
        if (mode === 'mode1') currentMode = 'mode1';
        else if (mode === 'mode2') currentMode = 'mode2';
        else if (mode === 'mode3') currentMode = 'mode3';
        const tabs = document.querySelectorAll('.tab-btn');
        tabs.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeInputElement = null; // 重置聚焦元素
        render();
    }

    function bindTabEvents() {
        const tabs = document.querySelectorAll('.tab-btn');
        tabs.forEach(btn => {
            btn.removeEventListener('click', handleTabClick);
            btn.addEventListener('click', handleTabClick);
        });
    }

    function setDefaultActiveTab() {
        const tabs = document.querySelectorAll('.tab-btn');
        tabs.forEach(btn => {
            const modeVal = btn.getAttribute('data-mode');
            if ((currentMode === 'mode2' && modeVal === 'mode2') ||
                (currentMode === 'mode1' && modeVal === 'mode1') ||
                (currentMode === 'mode3' && modeVal === 'mode3')) {
                btn.classList.add('active');
            } else btn.classList.remove('active');
        });
    }

    function init() {
        render();
        bindTabEvents();
        setDefaultActiveTab();
    }

    window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
