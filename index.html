<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>优惠计算器 | 立减·折扣·到手价</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #f0f4fa 0%, #dce3ec 100%);
            font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', 'Helvetica Neue', Helvetica, sans-serif;
            padding: 0.8rem 0.8rem 1.2rem;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
        }

        /* 主卡片 - 紧凑，去掉多余阴影留白 */
        .card {
            max-width: 560px;
            width: 100%;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.97);
            border-radius: 1.8rem;
            box-shadow: 0 12px 28px -10px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            transition: all 0.2s ease;
        }

        /* tab切换 - 更紧凑 */
        .tab-bar {
            display: flex;
            background: #f8fafd;
            padding: 0.4rem 0.6rem;
            gap: 0.4rem;
            border-bottom: 1px solid #eef2f8;
            flex-wrap: nowrap;
            overflow-x: auto;
            scrollbar-width: thin;
        }

        .tab-btn {
            flex: 1;
            text-align: center;
            padding: 0.55rem 0.2rem;
            font-size: 0.8rem;
            font-weight: 590;
            background: transparent;
            border: none;
            border-radius: 2rem;
            color: #5c6f8f;
            transition: all 0.2s;
            cursor: pointer;
            letter-spacing: -0.2px;
            white-space: nowrap;
        }

        .tab-btn.active {
            background: #ffffff;
            color: #1f3b62;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            font-weight: 620;
        }

        /* 内容区 - 削减内边距，让布局更紧密 */
        .content {
            padding: 0.9rem 1rem 1.2rem;
        }

        /* 置顶结果区 - 紧凑结果卡片 */
        .result-top-area {
            background: linear-gradient(135deg, #eef3ff 0%, #e4eefb 100%);
            border-radius: 1.4rem;
            padding: 0.7rem 1rem;
            margin-bottom: 1rem;
            transition: all 0.2s;
            border: 1px solid rgba(255,255,255,0.6);
        }

        /* 双输入行：同一行不换行（手机端一致）*/
        .input-row {
            display: flex;
            flex-direction: row;
            gap: 0.75rem;
            margin-bottom: 1rem;
            flex-wrap: nowrap;
        }

        .input-cell {
            flex: 1;
            min-width: 0; /* 防止溢出，保证等分 */
        }

        .input-label {
            font-size: 0.7rem;
            font-weight: 550;
            color: #2c3e50;
            margin-bottom: 0.2rem;
            letter-spacing: -0.2px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .label-icon {
            font-size: 0.85rem;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            background: #f2f5f9;
            border-radius: 1.5rem;
            border: 1px solid #e2e9f2;
            transition: all 0.2s;
            padding: 0.05rem 0.05rem 0.05rem 0.9rem;
        }

        .input-wrapper:focus-within {
            border-color: #3c6e9c;
            background: #ffffff;
            box-shadow: 0 0 0 2px rgba(60, 110, 156, 0.15);
        }

        .currency-symbol {
            font-size: 0.95rem;
            font-weight: 500;
            color: #5c6f87;
            margin-right: 4px;
        }

        .input-field {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 1rem;
            padding: 0.6rem 0.3rem 0.6rem 0;
            font-weight: 500;
            outline: none;
            color: #1a2c3f;
            width: 100%;
        }

        .input-field::placeholder {
            color: #b7c3d4;
            font-weight: 400;
            font-size: 0.8rem;
        }

        .percent-symbol {
            padding-right: 0.8rem;
            color: #6f85a3;
            font-weight: 500;
            font-size: 0.9rem;
        }

        /* 归零按钮紧凑 */
        .reset-btn {
            background: #f0f2f6;
            border: 1px solid #dce3ec;
            width: 100%;
            padding: 0.6rem;
            border-radius: 2rem;
            font-size: 0.85rem;
            font-weight: 570;
            color: #3a5670;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 0.3rem;
        }

        .reset-btn:active {
            transform: scale(0.97);
            background: #e4e9f0;
        }

        /* 结果区内样式紧凑微调 */
        .result-label {
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #4f6f8f;
            font-weight: 600;
        }

        .result-value {
            font-size: 1.9rem;
            font-weight: 750;
            color: #1a3f60;
            margin: 0.1rem 0 0.15rem;
            word-break: break-word;
            line-height: 1.2;
        }

        .discount-saved {
            background: rgba(30, 70, 60, 0.06);
            border-radius: 1.5rem;
            padding: 0.4rem 0.8rem;
            margin-top: 0.3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            font-weight: 500;
            color: #1a5a3c;
        }

        .saved-amount {
            font-size: 1.2rem;
            font-weight: 800;
            color: #137a4b;
        }

        .info-note {
            font-size: 0.65rem;
            color: #7c8ba0;
            text-align: center;
            margin-top: 0.5rem;
            border-top: 1px solid #eef2f8;
            padding-top: 0.5rem;
        }

        .error-msg {
            background: #ffe8e8;
            border-radius: 1.2rem;
            padding: 0.6rem;
            text-align: center;
            margin-top: 0;
            color: #d14b4b;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .neutral-tip {
            background: #f0f4fa;
            border-radius: 1.2rem;
            padding: 0.65rem;
            text-align: center;
            color: #567190;
            font-size: 0.73rem;
            font-weight: 500;
        }

        footer {
            font-size: 0.6rem;
            text-align: center;
            color: #8f9bb3;
            padding: 0.6rem 0 0.5rem;
            border-top: 1px solid #eef2f8;
            margin-top: 0.2rem;
        }
    </style>
</head>
<body>
<div class="card">
    <!-- 标题已完全移除，符合“去掉优惠计算器标题”，空间更紧凑 -->
    <div class="tab-bar">
        <button class="tab-btn" data-mode="mode1">💰 原价+折扣</button>
        <button class="tab-btn" data-mode="mode2">✨ 到手价+折扣</button>
        <button class="tab-btn" data-mode="mode3">🔁 原价+到手价</button>
    </div>

    <div class="content" id="appContent">
        <!-- 动态内容：置顶结果区 + 双输入行（一行不换行） + 归零按钮 -->
    </div>
    <footer>自动计算 · 一行输入 · 紧凑高效</footer>
</div>

<script>
    // 当前激活的模式: 'mode1' 原价+折扣 -> 到手价; 'mode2' 到手价+折扣 -> 原价; 'mode3' 原价+到手价 -> 折扣%
    let currentMode = 'mode2';   // 默认选中“到手价+折扣”
    const contentContainer = document.getElementById('appContent');

    // 格式化金额两位小数
    function formatMoney(value) {
        if (isNaN(value) || value === null || value === undefined) return '0.00';
        return Number(value).toFixed(2);
    }

    // 格式化百分比（一位小数）
    function formatPercent(value) {
        if (isNaN(value) || value === null || value === undefined) return '0.0';
        return Number(value).toFixed(1);
    }

    // 核心计算逻辑 (不变，无改动)
    function calculate(mode, originalPrice, finalPrice, discountPercent) {
        let result = {
            original: null,
            final: null,
            saved: null,
            discountPercent: null,
            error: null
        };

        if (mode === 'mode1') {
            let original = parseFloat(originalPrice);
            let discount = parseFloat(discountPercent);
            if (isNaN(original) || original <= 0) {
                result.error = '原价必须是大于0的数字';
                return result;
            }
            if (isNaN(discount)) {
                result.error = '请输入有效的折扣百分比';
                return result;
            }
            if (discount < 0) {
                result.error = '折扣不能小于0%';
                return result;
            }
            if (discount > 100) {
                result.error = '折扣不能超过100%';
                return result;
            }
            const finalCalculated = original * (1 - discount / 100);
            const savedCalculated = original - finalCalculated;
            result.original = Number(original.toFixed(2));
            result.final = Number(finalCalculated.toFixed(2));
            result.saved = Number(savedCalculated.toFixed(2));
            result.discountPercent = discount;
        } 
        else if (mode === 'mode2') {
            let final = parseFloat(finalPrice);
            let discount = parseFloat(discountPercent);
            if (isNaN(final) || final <= 0) {
                result.error = '到手价必须是大于0的数字';
                return result;
            }
            if (isNaN(discount)) {
                result.error = '请输入有效的折扣百分比';
                return result;
            }
            if (discount < 0) {
                result.error = '折扣不能小于0%';
                return result;
            }
            if (discount > 100) {
                result.error = '折扣不能超过100%';
                return result;
            }
            if (discount === 100) {
                result.error = '折扣100%意味着免费，原价无穷大，请调整折扣';
                return result;
            }
            const originalCalculated = final / (1 - discount / 100);
            if (originalCalculated <= 0) {
                result.error = '计算原价异常，请检查折扣是否100%';
                return result;
            }
            const savedCalculated = originalCalculated - final;
            result.original = Number(originalCalculated.toFixed(2));
            result.final = Number(final.toFixed(2));
            result.saved = Number(savedCalculated.toFixed(2));
            result.discountPercent = discount;
        }
        else if (mode === 'mode3') {
            let original = parseFloat(originalPrice);
            let final = parseFloat(finalPrice);
            if (isNaN(original) || original <= 0) {
                result.error = '原价必须是大于0的数字';
                return result;
            }
            if (isNaN(final) || final <= 0) {
                result.error = '到手价必须是大于0的数字';
                return result;
            }
            if (original < final) {
                result.error = '原价不能小于到手价（折扣不能为负）';
                return result;
            }
            const savedCalculated = original - final;
            let discountCalc = (savedCalculated / original) * 100;
            if (discountCalc > 100) discountCalc = 100;
            if (discountCalc < 0) discountCalc = 0;
            result.original = Number(original.toFixed(2));
            result.final = Number(final.toFixed(2));
            result.saved = Number(savedCalculated.toFixed(2));
            result.discountPercent = discountCalc;
        }
        
        if (result.original !== null) result.original = Number(result.original.toFixed(2));
        if (result.final !== null) result.final = Number(result.final.toFixed(2));
        if (result.saved !== null) result.saved = Number(result.saved.toFixed(2));
        if (result.discountPercent !== null) result.discountPercent = Number(result.discountPercent);
        
        return result;
    }

    // 展示结果至置顶区域
    function displayResultToTop(result, mode) {
        const topResultContainer = document.getElementById('topResultContainer');
        if (!topResultContainer) return;

        if (result && result.error) {
            topResultContainer.innerHTML = `<div class="error-msg">⚠️ ${escapeHtml(result.error)}</div>`;
            return;
        }
        
        if (!result || result.original === null || result.final === null) {
            topResultContainer.innerHTML = `<div class="neutral-tip">✨ 输入数字，自动计算优惠金额与折扣</div>`;
            return;
        }
        
        const originalPrice = result.original;
        const finalPrice = result.final;
        const savedAmount = result.saved;
        const discountPercent = result.discountPercent;
        
        if (mode === 'mode1') {
            const finalFormatted = formatMoney(finalPrice);
            const savedFormatted = formatMoney(savedAmount);
            const discPercent = (discountPercent !== null && discountPercent !== undefined) ? formatPercent(discountPercent) : '?';
            const html = `
                <div style="background: transparent;">
                    <div class="result-label">💰 优惠后到手价</div>
                    <div class="result-value">¥ ${finalFormatted}</div>
                    <div class="discount-saved">
                        <span>🎉 共优惠金额</span>
                        <span class="saved-amount">¥ ${savedFormatted}</span>
                    </div>
                    <div style="font-size:0.7rem; margin-top:6px; color:#407090;">
                        原价 ¥ ${formatMoney(originalPrice)} → 到手 ¥ ${finalFormatted}
                    </div>
                    <div class="info-note" style="margin-top: 4px;">
                        💡 立减 ${discPercent}% · 省了 ¥ ${savedFormatted}
                    </div>
                </div>
            `;
            topResultContainer.innerHTML = html;
        } 
        else if (mode === 'mode2') {
            const originalFormatted = formatMoney(originalPrice);
            const savedFormatted = formatMoney(savedAmount);
            const discPercent = (discountPercent !== null && discountPercent !== undefined) ? formatPercent(discountPercent) : '?';
            const html = `
                <div style="background: transparent;">
                    <div class="result-label">🏷️ 商品原价 (折前)</div>
                    <div class="result-value">¥ ${originalFormatted}</div>
                    <div class="discount-saved">
                        <span>🎉 共优惠金额</span>
                        <span class="saved-amount">¥ ${savedFormatted}</span>
                    </div>
                    <div style="font-size:0.7rem; margin-top:6px; color:#407090;">
                        原价 ¥ ${originalFormatted} → 到手 ¥ ${formatMoney(finalPrice)}
                    </div>
                    <div class="info-note" style="margin-top: 4px;">
                        💡 立减 ${discPercent}% · 省了 ¥ ${savedFormatted}
                    </div>
                </div>
            `;
            topResultContainer.innerHTML = html;
        }
        else if (mode === 'mode3') {
            const discPercentFormatted = formatPercent(discountPercent);
            const savedFormatted = formatMoney(savedAmount);
            const originalFormatted = formatMoney(originalPrice);
            const finalFormatted = formatMoney(finalPrice);
            const finalDiscount = (100 - discountPercent).toFixed(1);
            const html = `
                <div style="background: transparent;">
                    <div class="result-label">🎯 实际立减折扣</div>
                    <div class="result-value">${discPercentFormatted}%</div>
                    <div class="discount-saved">
                        <span>💸 共优惠金额</span>
                        <span class="saved-amount">¥ ${savedFormatted}</span>
                    </div>
                    <div style="font-size:0.7rem; margin-top:6px; background:rgba(0,0,0,0.02); padding:4px 10px; border-radius:2rem; display:inline-block; width:auto;">
                        原价 ¥ ${originalFormatted} → 到手 ¥ ${finalFormatted}
                    </div>
                    <div class="info-note" style="margin-top: 6px;">
                        📐 相当于打了 ${finalDiscount} 折，节省 ¥ ${savedFormatted}
                    </div>
                </div>
            `;
            topResultContainer.innerHTML = html;
        }
    }
    
    // 自动计算核心：获取当前模式下的输入值，计算结果并刷新置顶区域
    function performAutoCalculation() {
        let resultObj = null;
        let hasValidInput = false;
        
        if (currentMode === 'mode1') {
            const originalElem = document.getElementById('originalInput');
            const discountElem = document.getElementById('discountInput');
            if (originalElem && discountElem) {
                const origVal = originalElem.value.trim();
                const discVal = discountElem.value.trim();
                if (origVal !== '' && discVal !== '') {
                    hasValidInput = true;
                    resultObj = calculate('mode1', origVal, null, discVal);
                } else {
                    resultObj = { error: null, original: null, final: null, saved: null };
                }
            }
        } 
        else if (currentMode === 'mode2') {
            const finalElem = document.getElementById('finalInput');
            const discountElem = document.getElementById('discountInput');
            if (finalElem && discountElem) {
                const finalVal = finalElem.value.trim();
                const discVal = discountElem.value.trim();
                if (finalVal !== '' && discVal !== '') {
                    hasValidInput = true;
                    resultObj = calculate('mode2', null, finalVal, discVal);
                } else {
                    resultObj = { error: null, original: null, final: null, saved: null };
                }
            }
        }
        else if (currentMode === 'mode3') {
            const originalElem = document.getElementById('originalInput');
            const finalElem = document.getElementById('finalInput');
            if (originalElem && finalElem) {
                const origVal = originalElem.value.trim();
                const finalVal = finalElem.value.trim();
                if (origVal !== '' && finalVal !== '') {
                    hasValidInput = true;
                    resultObj = calculate('mode3', origVal, finalVal, null);
                } else {
                    resultObj = { error: null, original: null, final: null, saved: null };
                }
            }
        }
        
        if (resultObj) {
            if (!hasValidInput && (!resultObj.error || resultObj.error === null)) {
                const topContainer = document.getElementById('topResultContainer');
                if (topContainer) {
                    topContainer.innerHTML = `<div class="neutral-tip">📝 请输入完整信息，自动计算优惠结果</div>`;
                }
                return;
            }
            if (resultObj.error) {
                displayResultToTop(resultObj, currentMode);
            } else if (resultObj.original !== null && resultObj.final !== null) {
                displayResultToTop(resultObj, currentMode);
            } else if (!hasValidInput) {
                const topContainer = document.getElementById('topResultContainer');
                if (topContainer) topContainer.innerHTML = `<div class="neutral-tip">📝 输入数字，自动计算优惠金额与折扣</div>`;
            } else {
                displayResultToTop({ error: null, original: null, final: null }, currentMode);
            }
        } else {
            const topContainer = document.getElementById('topResultContainer');
            if (topContainer) topContainer.innerHTML = `<div class="neutral-tip">✨ 自动计算模式已开启</div>`;
        }
    }
    
    // 归零：清空当前模式下的两个输入框
    function resetAllInputs() {
        if (currentMode === 'mode1') {
            const origInput = document.getElementById('originalInput');
            const discInput = document.getElementById('discountInput');
            if (origInput) origInput.value = '';
            if (discInput) discInput.value = '';
        } 
        else if (currentMode === 'mode2') {
            const finalInput = document.getElementById('finalInput');
            const discInput = document.getElementById('discountInput');
            if (finalInput) finalInput.value = '';
            if (discInput) discInput.value = '';
        }
        else if (currentMode === 'mode3') {
            const origInput = document.getElementById('originalInput');
            const finalInput = document.getElementById('finalInput');
            if (origInput) origInput.value = '';
            if (finalInput) finalInput.value = '';
        }
        performAutoCalculation();
    }
    
    // 绑定输入框的自动计算事件（input）
    function bindAutoInputEvents() {
        if (currentMode === 'mode1') {
            const origEl = document.getElementById('originalInput');
            const discEl = document.getElementById('discountInput');
            if (origEl) origEl.addEventListener('input', () => performAutoCalculation());
            if (discEl) discEl.addEventListener('input', () => performAutoCalculation());
        } 
        else if (currentMode === 'mode2') {
            const finalEl = document.getElementById('finalInput');
            const discEl = document.getElementById('discountInput');
            if (finalEl) finalEl.addEventListener('input', () => performAutoCalculation());
            if (discEl) discEl.addEventListener('input', () => performAutoCalculation());
        }
        else if (currentMode === 'mode3') {
            const origEl = document.getElementById('originalInput');
            const finalEl = document.getElementById('finalInput');
            if (origEl) origEl.addEventListener('input', () => performAutoCalculation());
            if (finalEl) finalEl.addEventListener('input', () => performAutoCalculation());
        }
    }
    
    // 绑定归零按钮事件（避免重复绑定）
    function bindResetEvent() {
        const resetBtn = document.getElementById('resetButtonGlobal');
        if (resetBtn) {
            const newBtn = resetBtn.cloneNode(true);
            resetBtn.parentNode?.replaceChild(newBtn, resetBtn);
            newBtn.addEventListener('click', (e) => {
                e.preventDefault();
                resetAllInputs();
            });
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // 渲染界面：置顶结果区 + 双输入row（一行不换行） + 归零按钮
    function render() {
        let inputRowHtml = '';
        
        if (currentMode === 'mode1') {
            inputRowHtml = `
                <div class="input-row">
                    <div class="input-cell">
                        <div class="input-label"><span class="label-icon">🏷️</span> 原价</div>
                        <div class="input-wrapper">
                            <span class="currency-symbol">¥</span>
                            <input type="number" id="originalInput" class="input-field" placeholder="199.00" step="any" value="">
                        </div>
                    </div>
                    <div class="input-cell">
                        <div class="input-label"><span class="label-icon">⚡</span> 立减 %</div>
                        <div class="input-wrapper">
                            <input type="number" id="discountInput" class="input-field" placeholder="15" step="any" value="">
                            <span class="percent-symbol">%</span>
                        </div>
                    </div>
                </div>
            `;
        } 
        else if (currentMode === 'mode2') {
            inputRowHtml = `
                <div class="input-row">
                    <div class="input-cell">
                        <div class="input-label"><span class="label-icon">🛒</span> 到手价</div>
                        <div class="input-wrapper">
                            <span class="currency-symbol">¥</span>
                            <input type="number" id="finalInput" class="input-field" placeholder="89.90" step="any" value="">
                        </div>
                    </div>
                    <div class="input-cell">
                        <div class="input-label"><span class="label-icon">📉</span> 立减 %</div>
                        <div class="input-wrapper">
                            <input type="number" id="discountInput" class="input-field" placeholder="20" step="any" value="">
                            <span class="percent-symbol">%</span>
                        </div>
                    </div>
                </div>
            `;
        } 
        else if (currentMode === 'mode3') {
            inputRowHtml = `
                <div class="input-row">
                    <div class="input-cell">
                        <div class="input-label"><span class="label-icon">🏷️</span> 原价</div>
                        <div class="input-wrapper">
                            <span class="currency-symbol">¥</span>
                            <input type="number" id="originalInput" class="input-field" placeholder="299.00" step="any" value="">
                        </div>
                    </div>
                    <div class="input-cell">
                        <div class="input-label"><span class="label-icon">🎁</span> 到手价</div>
                        <div class="input-wrapper">
                            <span class="currency-symbol">¥</span>
                            <input type="number" id="finalInput" class="input-field" placeholder="209.30" step="any" value="">
                        </div>
                    </div>
                </div>
            `;
        }
        
        const fullHtml = `
            <div id="topResultContainer" class="result-top-area">
                <div class="neutral-tip">✨ 输入数字，自动计算优惠金额与折扣</div>
            </div>
            ${inputRowHtml}
            <button id="resetButtonGlobal" class="reset-btn">
                🔄 一键归零 / 清空所有
            </button>
        `;
        
        contentContainer.innerHTML = fullHtml;
        bindAutoInputEvents();
        bindResetEvent();
        performAutoCalculation();
    }
    
    // Tab切换
    function handleTabClick(e) {
        const btn = e.currentTarget;
        const mode = btn.getAttribute('data-mode');
        if (mode === 'mode1') currentMode = 'mode1';
        else if (mode === 'mode2') currentMode = 'mode2';
        else if (mode === 'mode3') currentMode = 'mode3';
        
        const tabs = document.querySelectorAll('.tab-btn');
        tabs.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
    }
    
    function bindTabEvents() {
        const tabs = document.querySelectorAll('.tab-btn');
        tabs.forEach(btn => {
            btn.removeEventListener('click', handleTabClick);
            btn.addEventListener('click', handleTabClick);
        });
    }
    
    function setDefaultActiveTab() {
        const tabs = document.querySelectorAll('.tab-btn');
        tabs.forEach(btn => {
            const modeVal = btn.getAttribute('data-mode');
            if ((currentMode === 'mode2' && modeVal === 'mode2') ||
                (currentMode === 'mode1' && modeVal === 'mode1') ||
                (currentMode === 'mode3' && modeVal === 'mode3')) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
    }
    
    function init() {
        render();              
        bindTabEvents();      
        setDefaultActiveTab(); 
    }
    
    window.addEventListener('DOMContentLoaded', () => {
        init();
    });
</script>
</body>
</html>
